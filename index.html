<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Ultra</title>
    <style>
        :root {
            --pokedex-red: #ff1f1f;
            --pokedex-dark: #222;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .pokedex-box {
            background-color: var(--pokedex-red);
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            border: 8px solid #a50a0a;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            font-weight: bold;
        }

        .screen {
            background: white;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            border: 4px solid #999;
        }

        #pk-image {
            width: 160px;
            height: 160px;
            display: block;
            margin: 0 auto;
        }

        .type-tag {
            display: inline-block;
            padding: 5px 12px;
            margin: 5px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }

        /* Cores de Tipos */
        .normal { background: #A8A878; } .fire { background: #F08030; }
        .water { background: #6890F0; } .grass { background: #78C850; }
        .electric { background: #F8D030; } .ice { background: #98D8D8; }
        .fighting { background: #C03028; } .poison { background: #A040A0; }
        .ground { background: #E0C068; } .flying { background: #A890F0; }
        .psychic { background: #F85888; } .bug { background: #A8B020; }
        .rock { background: #B8A038; } .ghost { background: #705898; }
        .dragon { background: #7038F8; } .dark { background: #705848; }
        .steel { background: #B8B8D0; } .fairy { background: #EE99AC; }

        .stats-list {
            margin: 15px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 4px 0;
            font-size: 14px;
        }

        .effectiveness-box {
            font-size: 13px;
            line-height: 1.6;
            margin-top: 10px;
            padding: 10px;
            border: 1px dashed #ccc;
        }

        .evolution-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            border-top: 2px solid #eee;
            padding-top: 10px;
        }

        .evo-card {
            text-align: center;
            cursor: pointer;
            font-size: 12px;
        }

        .evo-card img { width: 60px; transition: transform 0.2s; }
        .evo-card img:hover { transform: scale(1.2); }

        .btn-shiny {
            display: block;
            width: 100%;
            margin-top: 10px;
            background: #ffcc00;
            color: #000;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="pokedex-box">
    <div class="search-bar">
        <input type="text" id="pkInput" placeholder="Ex: Pikachu ou 25">
        <button onclick="buscar()">BUSCAR</button>
    </div>

    <div id="loading" class="hidden" style="color: white; text-align: center;">Buscando dados...</div>

    <div id="mainScreen" class="screen hidden">
        <h2 id="nameDisplay" style="text-align:center; margin-top:0;"></h2>
        <div id="typeDisplay" style="text-align:center;"></div>
        
        <img id="pk-image" src="" alt="Pokemon">
        <button class="btn-shiny" onclick="alternarShiny()">Alternar Normal / Shiny</button>

        <div class="stats-list" id="statsDisplay"></div>

        <div class="effectiveness-box">
            <strong>Fraquezas (2x+):</strong> <span id="weaknesses"></span><br>
            <strong>Resistências (0.5x-):</strong> <span id="resistances"></span>
        </div>

        <h4 style="margin: 15px 0 5px 0;">Evoluções:</h4>
        <div id="evoDisplay" class="evolution-row"></div>
    </div>
</div>

<script>
    let pokemonData = null;
    let showingShiny = false;

    async function buscar(nome) {
        const query = nome || document.getElementById('pkInput').value.toLowerCase().trim();
        if (!query) return;

        // Reset visual
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');

        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
            if (!response.ok) throw new Error("Não encontrado");
            
            pokemonData = await response.json();
            renderizar();
        } catch (err) {
            alert("Pokémon não encontrado! Verifique a escrita.");
            document.getElementById('loading').classList.add('hidden');
        }
    }

    function alternarShiny() {
        showingShiny = !showingShiny;
        renderizar();
    }

    async function renderizar() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');

        // Básicos
        document.getElementById('nameDisplay').innerText = `#${pokemonData.id} - ${pokemonData.name.toUpperCase()}`;
        document.getElementById('pk-image').src = showingShiny ? 
            pokemonData.sprites.front_shiny || pokemonData.sprites.front_default : 
            pokemonData.sprites.front_default;

        // Tipos
        const typeDiv = document.getElementById('typeDisplay');
        typeDiv.innerHTML = pokemonData.types.map(t => 
            `<span class="type-tag ${t.type.name}">${t.type.name}</span>`
        ).join('');

        // Stats
        const statsDiv = document.getElementById('statsDisplay');
        statsDiv.innerHTML = pokemonData.stats.map(s => 
            `<div class="stat-item"><span>${s.stat.name.toUpperCase()}</span> <b>${s.base_stat}</b></div>`
        ).join('');

        // Efetividade e Evoluções (Assíncronos)
        carregarEvolucoes(pokemonData.species.url);
        carregarFraquezas(pokemonData.types);
    }

    async function carregarFraquezas(types) {
        let doubleFrom = new Set();
        let halfFrom = new Set();
        let noFrom = new Set();

        for (const t of types) {
            const res = await fetch(t.type.url);
            const data = await res.json();
            data.damage_relations.double_damage_from.forEach(d => doubleFrom.add(d.name));
            data.damage_relations.half_damage_from.forEach(d => halfFrom.add(d.name));
            data.damage_relations.no_damage_from.forEach(d => noFrom.add(d.name));
        }

        // Filtra para não repetir (ex: se um tipo é 2x e outro é 0.5x, vira neutro na média)
        const pureWeakness = [...doubleFrom].filter(w => !halfFrom.has(w) && !noFrom.has(w));
        const pureResistance = [...halfFrom, ...noFrom];

        document.getElementById('weaknesses').innerText = pureWeakness.join(', ') || 'Nenhuma';
        document.getElementById('resistances').innerText = [...new Set(pureResistance)].join(', ') || 'Nenhuma';
    }

    async function carregarEvolucoes(speciesUrl) {
        const species = await (await fetch(speciesUrl)).json();
        const evoChain = await (await fetch(species.evolution_chain.url)).json();
        const display = document.getElementById('evoDisplay');
        display.innerHTML = '';

        let etapa = evoChain.chain;
        while (etapa) {
            const id = etapa.species.url.split('/').filter(Boolean).pop();
            const imgUrl = showingShiny ? 
                `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png` :
                `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

            display.innerHTML += `
                <div class="evo-card" onclick="buscar('${etapa.species.name}')">
                    <img src="${imgUrl}">
                    <p>${etapa.species.name}</p>
                </div>`;
            etapa = etapa.evolves_to[0]; // Pega a próxima evolução
        }
    }

    // Permitir busca ao apertar Enter
    document.getElementById('pkInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscar();
    });
</script>

</body>
</html>
